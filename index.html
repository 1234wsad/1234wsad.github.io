<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>应用下载 - 山东云擎</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 下载卡片样式 */
        .download-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }
        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            object-fit: cover;
        }
        .app-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111;
        }
        .app-version {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .download-btn {
            display: inline-block;
            width: 100%;
            background: linear-gradient(135deg, #2f54eb, #1890ff);
            color: #fff;
            padding: 14px 0;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(24, 144, 255, 0.3);
            transition: transform 0.2s;
        }
        .download-btn:active {
            transform: scale(0.98);
        }

        /* 微信遮罩层样式 */
        #weixin-tip {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
        }
        .tip-img {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 80%;
            max-width: 320px;
        }
        .tip-text {
            color: #fff;
            position: absolute;
            top: 160px;
            left: 5%;
            width: 90%;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
        }
        .tip-text span {
            color: #ff4d4f;
            font-weight: bold;
        }
    </style>
</head>
